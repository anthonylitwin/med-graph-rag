services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MODEL_PROFILE=${MODEL_PROFILE:-frontier}
      - LOCAL_MODEL=${LOCAL_MODEL:-qwen2.5:7b-instruct}
      - OLLAMA_BASE_URL=${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - EXTRACTOR_ENTITY_MODEL=${EXTRACTOR_ENTITY_MODEL:-Ihor/gliner-biomed-small-v1.0}
    volumes:
      - ./apps/api/app:/app/app
      - ./packages:/app/packages
    depends_on:
      - neo4j
      - mlflow
      - minio

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/medgraphrag-password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root s3://medgraphrag-artifacts
    environment:
      - AWS_ACCESS_KEY_ID=medgraphrag
      - AWS_SECRET_ACCESS_KEY=medgraphrag-password
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    depends_on:
      - minio
    volumes:
      - mlflow_data:/mlflow

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=medgraphrag
      - MINIO_ROOT_PASSWORD=medgraphrag-password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  neo4j_data:
  neo4j_logs:
  mlflow_data:
  minio_data:
